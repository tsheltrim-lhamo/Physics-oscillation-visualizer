<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Physics Oscillation Visualizer</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to load the correct page without a page refresh.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    <script type="text/javascript">
      // Redirect to index.html with the current path as a query parameter
      var path = window.location.pathname;
      var repo = "/Physics-oscillation-visualizer";
      if (path.startsWith(repo)) {
        path = path.slice(repo.length);
      }
      window.location.replace(window.location.origin + repo + "/index.html?p=" + path.replace(/&/g, '~and~') + (window.location.search ? '&q=' + window.location.search.slice(1).replace(/&/g, '~and~') : '') + window.location.hash);
    </script>
  </head>
  <body>
  </body>
</html>
