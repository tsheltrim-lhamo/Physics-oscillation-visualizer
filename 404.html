<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Physics Oscillation Visualizer</title>
    <script type="text/javascript">
      var path = window.location.pathname;
      var repo = "/Physics-oscillation-visualizer";
      // If we are at the root of the repo or a sub-path, redirect to index.html with ?p=path
      var segment = path.startsWith(repo) ? path.slice(repo.length) : path;
      window.location.replace(window.location.origin + repo + "/index.html?p=" + segment.replace(/&/g, '~and~') + (window.location.search ? '&q=' + window.location.search.slice(1).replace(/&/g, '~and~') : '') + window.location.hash);
    </script>
  </head>
  <body>
  </body>
</html>
